version: '3.8'

services:
  vigil:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - SEARCH_ENGINE_URL=${SEARCH_ENGINE_URL}
    depends_on:
      - searxng
      # - ollama # Uncomment if you want to run Ollama as a service

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - SEARXNG_PORT=8080

  # ollama: # Uncomment to run Ollama as a service
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ./ollama_models:/root/.ollama
  #   command: serve
